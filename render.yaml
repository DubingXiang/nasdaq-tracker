services:
  - type: web
    name: nasdaq-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --threads 2 --preload
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
